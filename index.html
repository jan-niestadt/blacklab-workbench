<!DOCTYPE html>
<html lang="en">
	<head>
		<title>BlackLab workbench</title>
		<meta charset="UTF-8" /> 
		<link rel='stylesheet' type='text/css' href='style.css'>
		<script src="code.js"></script>
	</head>
	<body>
		<h1>BlackLab workbench</h1>
        <table>
            <tr>
                <th>Server:</th>
                <td><select id="server-list"></select></td>
                <td id="server-info"></td>
            </tr>
            <tr>
                <th>Corpus:</th>
                <td><select id="corpus-list"></select></td>
                <td id="corpus-info"></td>
            </tr>
        </table>

        <div class="loading-overlay">
            <div class="spinner"></div> Loading...
        </div>

        <form id="search-form">
            <fieldset>
                <ul>
                    <li id="li-corpus">
                    </li>
                    <li>
                        <label for="patt">BCQL query:</label>
                        <textarea id="patt"></textarea>
                    </li>
                    <li>
                        <label for="outputformat">Output Format:</label>
                        <select id="outputformat">
                            <option value="json">JSON</option>
                            <option value="xml">XML</option>
                            <option value="csv">CSV</option>
                        </select>
                    </li>
                    <li>
                        <label for="api">API Version:</label>
                        <select id="api">
                            <option value="">default</option>
                            <option value="4">v4</option>
                            <option value="5">v5</option>
                        </select>
                    </li>
                    <li>
                        <label>&nbsp;</label>
                        <input type='submit' value='Send' />
                    </li>
                </ul>
            </fieldset>
            
        </form>

        <p class="url">
            URL: <a target="_blank" href="" id='url' class="show-url"></a>
        </p>

        <div id="response-view">

            <p><label for="view-plain"><input type="checkbox" id="view-plain" /> View plain</label></p>

             <!-- The response will be shown here -->
            <pre id='plain-results'>
            </pre>

            <div id='results'>
            </div>
        </div>
